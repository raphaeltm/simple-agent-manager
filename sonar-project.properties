sonar.projectKey=raphaeltm_simple-agent-manager
sonar.organization=raphaeltm

# Treat test directories as test sources rather than production sources so
# PR quality gates do not count intentionally repetitive test scaffolding as
# duplicated runtime code.
sonar.tests=tests,packages/cloud-init/tests,packages/providers/tests,packages/acp-client/tests,packages/ui/tests,packages/terminal/tests,packages/shared/tests,apps/web/tests,apps/tail-worker/tests,apps/api/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*_test.go,**/tests/**

# Exclude test files and config scaffolding from duplication detection —
# test scaffolding (D1 seed helpers, DO stub factories) is intentionally
# similar across test suites and does not warrant abstraction.
sonar.cpd.exclusions=**/*.config.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*_test.go,**/tests/**,apps/api/tests/**/*.ts,apps/api/tests/**/*,.github/workflows/**,vitest.coverage.ts,sonar-project.properties
