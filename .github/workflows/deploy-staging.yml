name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without applying'
        required: false
        type: boolean
        default: false

# Only one staging deployment at a time; queue (don't cancel) concurrent requests
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: staging
      skip_agent: false # Required: staging VMs need the agent binary in R2
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
