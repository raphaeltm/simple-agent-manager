name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/www/**'
      - '.github/workflows/deploy-www.yml'
  workflow_dispatch:

concurrency:
  group: deploy-www
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  deploy:
    name: Build & Deploy
    # Guard: only run on the canonical repository, not on forks. The marketing
    # site is product-specific to simple-agent-manager.org and should not deploy
    # to a fork's domain even if they have Cloudflare secrets configured.
    if: github.repository == 'raphaeltm/simple-agent-manager'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Marketing Site Project
        id: names
        run: |
          EXPLICIT="${{ vars.RESOURCE_PREFIX }}"
          if [ -n "$EXPLICIT" ]; then
            PREFIX="$EXPLICIT"
          else
            DOMAIN="${{ vars.BASE_DOMAIN }}"
            if [ -z "$DOMAIN" ]; then
              echo "::error::BASE_DOMAIN is required when RESOURCE_PREFIX is not set."
              exit 1
            fi
            HASH=$(echo -n "$DOMAIN" | sha256sum | cut -c1-6)
            PREFIX="s${HASH}"
          fi

          echo "pages_project=${PREFIX}-www" >> "$GITHUB_OUTPUT"
          echo "www_domain=www.${{ vars.BASE_DOMAIN }}" >> "$GITHUB_OUTPUT"

      - name: Build marketing site
        run: pnpm --filter @simple-agent-manager/www build
        env:
          SITE_URL: https://${{ steps.names.outputs.www_domain }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/www/dist --project-name=${{ steps.names.outputs.pages_project }} --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Write Job Summary
        if: always()
        run: |
          WWW_DOMAIN="${{ steps.names.outputs.www_domain }}"
          if [ "${{ job.status }}" = "success" ]; then
            echo "## Marketing Site Deployed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**URL:** https://${WWW_DOMAIN}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Pages URL:** https://${{ steps.names.outputs.pages_project }}.pages.dev" >> "$GITHUB_STEP_SUMMARY"
            echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Marketing Site Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Check the logs above for error details." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Troubleshooting" >> "$GITHUB_STEP_SUMMARY"
            echo "- Ensure infrastructure is provisioned (run the **Provision Marketing Site Infrastructure** workflow)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Verify \`CF_API_TOKEN\` and \`CF_ACCOUNT_ID\` secrets are set" >> "$GITHUB_STEP_SUMMARY"
          fi
