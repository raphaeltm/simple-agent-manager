name: E2E Smoke

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/www/**'

permissions:
  contents: read

jobs:
  vm-agent-smoke:
    name: VM Agent Smoke (${{ matrix.control_plane }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - control_plane: mock
            command: pnpm test:e2e:vm-agent-smoke
          - control_plane: worker
            command: pnpm test:e2e:vm-agent-smoke:worker

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke test
        run: ${{ matrix.command }}
