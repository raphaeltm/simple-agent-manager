name: E2E Smoke

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/www/**'

permissions:
  contents: read

jobs:
  vm-agent-smoke:
    name: VM Agent Smoke (${{ matrix.control_plane }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - control_plane: mock
            command: pnpm test:e2e:vm-agent-smoke
          - control_plane: worker
            command: pnpm test:e2e:vm-agent-smoke:worker

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke test
        run: ${{ matrix.command }}
