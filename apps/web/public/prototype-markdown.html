// ===================================================================
// Configure marked
// ===================================================================
const renderer = new marked.Renderer();

// Custom code block renderer: add language header + copy button
renderer.code = function({ text, lang }) {
  const language = lang || '';
  const highlighted = language && hljs.getLanguage(language)
    ? hljs.highlight(text, { language }).value
    : escapeHtml(text);
  const header = language
    ? `<div class="code-header"><span>${language}</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>`
    : `<div class="code-header"><span>code</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>`;
  return `<pre>${header}<code class="hljs">${highlighted}</code></pre>`;
};

// Task list support
renderer.listitem = function({ text, task, checked }) {
  if (task) {
    return `<li class="task-list-item"><input type="checkbox" disabled ${checked ? 'checked' : ''} /><span>${text}</span></li>`;
  }
  return `<li>${text}</li>`;
};

renderer.list = function({ body, ordered, start }) {
  const tag = ordered ? 'ol' : 'ul';
  const startAttr = ordered && start !== 1 ? ` start="${start}"` : '';
  const cls = body.includes('task-list-item') ? ' class="contains-task-list"' : '';
  return `<${tag}${startAttr}${cls}>${body}</${tag}>`;
};

marked.setOptions({
  renderer,
  gfm: true,
  breaks: false,
});

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = 'copy'; }, 1500);
  });
}

// ===================================================================
// Render markdown content safely inside a bubble
// ===================================================================
function renderMarkdown(md) {
  return marked.parse(md);
}

The task runner is the core orchestration primitive in SAM. Here's how it works end-to-end:

### 1. Task Submission

When a user submits a task (via the chat UI or API), the system:

- Creates a \`task\` row in D1 with status \`pending\`
- Resolves agent configuration using the **precedence chain**: explicit override > agent profile > project default > platform default
- Generates a descriptive branch name like \`sam/fix-auth-middleware-01kq98\`

### 2. Node Selection & Provisioning

The runner selects a node using this priority:

1. **Warm nodes** -- reuse an existing idle node (fastest, ~5s)
2. **Existing nodes** with capacity -- add a workspace to a running VM
3. **New provisioning** -- spin up a fresh Hetzner VM (~90s)

> **Note:** Different users never share the same node. This is a hard security isolation requirement.

Once a node is ready:

    projectId: task.projectId,
    branch: task.branch,
    vmSize: resolveVmSize(task),
  });

  // Then start the agent session
  await startAgentSession(workspace.id, task);
}

- MCP tools for interacting with the platform

After a task completes, the node doesn't get destroyed immediately. Instead it enters a **warm** state where it can be reused for the next task -- this cuts provisioning time from ~90s down to ~5s.

### How It Works

The lifecycle is managed by the \`NodeLifecycle\` Durable Object:

\`\`\`
active --> warm (idle timeout starts)
              |
              |--> reused (back to active)
              |
              +--> destroying (timeout expired)
\`\`\`

There's a **three-layer defense** against orphaned nodes:

1. **DO alarm** -- the primary mechanism, fires at \`NODE_WARM_TIMEOUT_MS\`
2. **Cron sweep** -- backup that catches nodes whose DO alarm didn't fire
3. **Max lifetime** -- hard cap regardless of reuse

### Configuration

All of these are configurable per-project or globally:

\`\`\`bash
# Global defaults (environment variables)
NODE_WARM_TIMEOUT_MS=1800000        # 30 minutes
MAX_WORKSPACES_PER_NODE=4           # capacity limit
NODE_CPU_THRESHOLD_PERCENT=80       # scheduling threshold
NODE_MEMORY_THRESHOLD_PERCENT=85    # scheduling threshold
\`\`\`

You can also set **per-project overrides** in the project settings UI under "Scaling Parameters":

- \`warmNodeTimeoutMs\` -- how long to keep nodes warm
- \`maxConcurrentTasks\` -- max parallel tasks
- \`maxWorkspacesPerNode\` -- density limit
- \`taskExecutionTimeoutMs\` -- hard timeout per task

> **Pro tip:** For projects with bursty workloads, set a longer warm timeout. For cost-sensitive projects, set it shorter or to \`0\` (immediate destroy).

### Resolution Chain

The config resolves in order:

1. **Explicit task override** (if the dispatch call specifies it)
2. **Agent profile** (if the task uses a named profile)
3. **Project default** (set in project settings)
4. **Platform default** (environment variable or hardcoded constant)

    maxConcurrentTasks:
      project.maxConcurrentTasks

    // ... etc
  };
}

func (s *SessionHost) HandlePrompt(ctx context.Context, prompt string) error {
    cmd := exec.CommandContext(ctx, s.agentBinary, "--prompt", prompt)
    cmd.Dir = s.workDir
    cmd.Env = append(os.Environ(),
        "ANTHROPIC_API_KEY="+s.apiKey,
        "MCP_SERVER_URL="+s.mcpURL,
    )

    stdout, err := cmd.StdoutPipe()
    if err != nil {
        return fmt.Errorf("stdout pipe: %w", err)
    }

    if err := cmd.Start(); err != nil {
        return fmt.Errorf("start agent: %w", err)
    }

    go s.streamOutput(stdout)
    return cmd.Wait()
}

Here's a practical example combining multiple elements. When debugging a task failure, SAM might respond like this:

The error log shows:

**Root cause:** The MCP server wasn't started before the agent tried to connect. This happens when:

1. The \`vm-agent\` starts the agent session *before* confirming the MCP endpoint is healthy
2. The health check timeout (\`MCP_HEALTH_TIMEOUT_MS\`) is too short for cold starts

**Fix:** Increase the timeout or add a retry with backoff:

\`\`\`typescript
const MCP_HEALTH_TIMEOUT_MS = env.MCP_HEALTH_TIMEOUT_MS ?? 10000;

await retry(
  () => healthCheck(mcpUrl),
  { maxRetries: 3, baseDelayMs: 1000 },
);

import asyncio
from datetime import datetime, timedelta
from collections import defaultdict

async def compute_retention_cohorts(
    db: Database,
    weeks: int = 12,
) -> list[dict]:
    """Compute weekly retention cohorts from signup + activity data."""
    cohorts = []
    now = datetime.utcnow()

    for week_offset in range(weeks):
        cohort_start = now - timedelta(weeks=week_offset + 1)
        cohort_end = cohort_start + timedelta(weeks=1)

        # Users who signed up in this week
        signups = await db.query(
            "SELECT id FROM users WHERE created_at BETWEEN ? AND ?",
            [cohort_start.isoformat(), cohort_end.isoformat()],
        )
        signup_ids = {row["id"] for row in signups}

        if not signup_ids:
            continue

        # Check activity in each subsequent week
        retention = []
        for future_week in range(week_offset + 1):
            check_start = cohort_end + timedelta(weeks=future_week)
            check_end = check_start + timedelta(weeks=1)

            active = await db.query(
                "SELECT DISTINCT user_id FROM events "
                "WHERE user_id IN (?) AND created_at BETWEEN ? AND ?",
                [list(signup_ids), check_start.isoformat(), check_end.isoformat()],
            )
            retention.append(len(active) / len(signup_ids) * 100)

        cohorts.append({
            "week": cohort_start.strftime("%Y-W%U"),
            "signups": len(signup_ids),
            "retention": retention,
        })

    return cohorts
