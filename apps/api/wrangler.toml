name = "workspaces-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
port = 8787

# unicorn-magic exports toPath/traversePathUp only under the "node" condition.
# Wrangler's esbuild resolves "default" which lacks them, breaking the
# @mastra/core → execa → npm-run-path → unicorn-magic import chain.
# Alias to a local shim that provides the node-condition exports.
[alias]
"unicorn-magic" = "./src/shims/unicorn-magic.ts"

[vars]
BASE_DOMAIN = "workspaces.example.com"
VERSION = "0.1.0"
MAX_NODES_PER_USER = "10"
MAX_WORKSPACES_PER_NODE = "3"
MAX_AGENT_SESSIONS_PER_WORKSPACE = "10"
NODE_HEARTBEAT_STALE_SECONDS = "180"
MAX_PROJECTS_PER_USER = "100"
MAX_SESSIONS_PER_PROJECT = "1000"
MAX_MESSAGES_PER_SESSION = "10000"
MESSAGE_SIZE_THRESHOLD = "102400"
ACTIVITY_RETENTION_DAYS = "90"
SESSION_IDLE_TIMEOUT_MINUTES = "60"
DO_SUMMARY_SYNC_DEBOUNCE_MS = "5000"
DEFAULT_TASK_AGENT_TYPE = "claude-code"
R2_BUCKET_NAME = "workspaces-dev-assets"
VM_AGENT_PROTOCOL = "https"
VM_AGENT_PORT = "8443"
NEKO_IMAGE = "ghcr.io/m1k1o/neko/google-chrome:latest"
NEKO_PRE_PULL = "true"
TASK_RUNNER_WORKSPACE_READY_POLL_INTERVAL_MS = "30000"

# D1 Database
[[d1_databases]]
binding = "DATABASE"
database_name = "workspaces-dev"
database_id = "your-d1-database-id"
migrations_dir = "src/db/migrations"

# D1 Observability Database (error storage, isolated from main DB — spec 023)
[[d1_databases]]
binding = "OBSERVABILITY_DATABASE"
database_name = "observability-dev"
database_id = "your-observability-d1-id"
migrations_dir = "src/db/migrations/observability"

# KV for sessions
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"

# R2 for VM Agent binaries
[[r2_buckets]]
binding = "R2"
bucket_name = "workspaces-dev-assets"


# Durable Objects for per-project data (chat sessions, activity events, task status events)
[[durable_objects.bindings]]
name = "PROJECT_DATA"
class_name = "ProjectData"

# Durable Objects for per-node warm pool lifecycle (alarm-based idle timeout)
[[durable_objects.bindings]]
name = "NODE_LIFECYCLE"
class_name = "NodeLifecycle"

# Durable Object for admin real-time log streaming (singleton — spec 023)
[[durable_objects.bindings]]
name = "ADMIN_LOGS"
class_name = "AdminLogs"

# Durable Object for alarm-driven task orchestration (TDF-2 — one DO per task)
[[durable_objects.bindings]]
name = "TASK_RUNNER"
class_name = "TaskRunner"

# Durable Object for per-user notification storage and real-time delivery
[[durable_objects.bindings]]
name = "NOTIFICATION"
class_name = "NotificationService"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProjectData"]

[[migrations]]
tag = "v2"
new_classes = ["NodeLifecycle"]

[[migrations]]
tag = "v3"
new_classes = ["AdminLogs"]

[[migrations]]
tag = "v4"
new_classes = ["TaskRunner"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["NotificationService"]

# Analytics Engine for usage tracking (Phase 1 — server-side analytics)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "sam_analytics"

# Workers AI for speech-to-text transcription
[ai]
binding = "AI"

# NOTE: [env.*] sections are NOT checked in — they are generated at deploy time
# by scripts/deploy/sync-wrangler-config.ts from Pulumi outputs + top-level config.
# tail_consumers are also generated (and intentionally absent from top-level config
# because they break Vitest — Cloudflare issue #9343).

# Cron triggers:
# - Every 5 minutes: provisioning timeout checks, warm node cleanup, stuck task recovery
# - Daily at 03:00 UTC: analytics event forwarding to external platforms (Phase 4)
# NOTE: The daily cron string "0 3 * * *" is matched exactly in index.ts:scheduled()
# to distinguish the daily forward job from the 5-minute sweep. If you change it here,
# update the comparison in the scheduled handler too.
[triggers]
crons = ["*/5 * * * *", "0 3 * * *"]

# Secrets (set via wrangler secret put):
# - GITHUB_CLIENT_ID
# - GITHUB_CLIENT_SECRET
# - GITHUB_APP_ID
# - GITHUB_APP_PRIVATE_KEY
# - CF_API_TOKEN
# - CF_ZONE_ID
# - CF_ACCOUNT_ID (required for admin observability log viewer)
# - JWT_PRIVATE_KEY
# - JWT_PUBLIC_KEY
# - ENCRYPTION_KEY
# - BETTER_AUTH_SECRET (optional — overrides ENCRYPTION_KEY for BetterAuth sessions)
# - CREDENTIAL_ENCRYPTION_KEY (optional — overrides ENCRYPTION_KEY for AES-GCM credential encryption)
# - GITHUB_WEBHOOK_SECRET (optional — overrides ENCRYPTION_KEY for GitHub webhook HMAC)
# - ORIGIN_CA_CERT (Origin CA certificate for VM agent TLS)
# - ORIGIN_CA_KEY (Origin CA private key for VM agent TLS)
# - GOOGLE_CLIENT_ID (optional — Google Cloud Console OAuth client ID, enables GCP OIDC integration)
# - GOOGLE_CLIENT_SECRET (optional — Google Cloud Console OAuth client secret)
# - SEGMENT_WRITE_KEY (optional — Segment.io write key, enables Segment event forwarding)
# - GA4_API_SECRET (optional — Google Analytics 4 API secret, enables GA4 forwarding; NOTE: GA4 Measurement Protocol requires api_secret as a query parameter — ensure outbound request URLs are not logged)
# - R2_ACCESS_KEY_ID (optional — R2 S3-compatible API token key ID, enables task attachment presigned uploads)
# - R2_SECRET_ACCESS_KEY (optional — R2 S3-compatible API token secret, enables task attachment presigned uploads)
